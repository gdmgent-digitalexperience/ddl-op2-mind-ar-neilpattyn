<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDL Image Tracking</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <link rel="stylesheet" href="./css/main.css">
</head>
<body>

    <nav>
        <ul>
            <li>
                <a href="./index.html">Home</a>
            </li>
            <li>
                <a href="./image.html">Image Tracking</a>
            </li>
            <li>
                <a href="./face.html">Face Tracking</a>
            </li>
        </ul>
    </nav>

    <a-scene 
        mindar-image="imageTargetSrc: ./assets/targetskittens.mind; maxTrack: 4" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights"
        device-orientation-permission-ui="enabled: false"
        vr-mode-ui="enabled: false"
    >

        <a-assets>
            <a-asset-item
            id="cat"
            src="./assets/cat_-_ps1_low_poly_rigged.glb"></a-asset-item>
        </a-assets>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model src="#cat" position="0 0 1" scale="0.1 0.1 0.1" rotation="90 90 90"></a-gltf-model>
        </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-box position="0 0 0" material="color: blue;" opacity="0.8"></a-box>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 2">
        <a-box position="0 0 0" material="color: green;" opacity="0.6"></a-box>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 3">
        <a-box position="0 0 0" material="color: orange;" opacity="0.6"></a-box>
    </a-entity>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-scene>

</body>
</html>
